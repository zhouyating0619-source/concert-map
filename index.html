<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoya's Musical Archive</title>
    <style>
        /* ===== 1. 基础设置 ===== */
        :root {
            --bg-color: #161412;
            --surface-color: #23201d;
            --gold-light: #e6c887;
            --gold-dark: #b68d40;
            --text-main: #e8dcca;
            --text-muted: #8b8075;
            --border-gold: 1px solid rgba(182, 141, 64, 0.4);
            --font-serif: "Georgia", "Times New Roman", "STZhongsong", serif;
            --font-sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body { margin: 0; padding: 0; background: var(--bg-color); font-family: var(--font-sans); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* ===== 2. 导航栏 & 播放器 ===== */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(22, 20, 18, 0.85); backdrop-filter: blur(12px); border-bottom: var(--border-gold); display: flex; justify-content: space-between; align-items: center; z-index: 1000; padding: 0 40px; box-sizing: border-box; }
        .nav-brand { font-family: var(--font-serif); font-size: 1.8rem; color: var(--gold-light); letter-spacing: 4px; cursor: pointer; text-transform: uppercase; }
        .nav-right { display: flex; align-items: center; gap: 30px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-link { font-size: 0.9rem; letter-spacing: 2px; color: var(--text-muted); cursor: pointer; transition: color 0.4s; text-transform: uppercase; }
        .nav-link.active { color: var(--gold-light); border-bottom: 1px solid var(--gold-light); padding-bottom: 4px; }
        
        .music-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; color: #161412; transition: transform 0.4s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .music-btn.playing { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ===== 3. 公共视图 ===== */
        .view-layer { position: absolute; top: 70px; bottom: 0; left: 0; width: 100vw; height: calc(100vh - 70px); transition: opacity 0.6s ease, transform 0.6s ease; display: none; opacity: 0; overflow-y: auto; overflow-x: hidden; }
        .view-layer.active { display: block; opacity: 1; transform: translateY(0); }

        /* ===== 4. 首页 (精简版CSS, 保持不变) ===== */
        #home-view { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 50px; }
        .home-profile img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold-dark); object-fit: cover; }
        .hero-title { font-family: var(--font-serif); font-size: clamp(3rem, 6vw, 5rem); color: var(--gold-light); text-align: center; margin-bottom: 15px; }
        .hero-subtitle { font-size: 1rem; color: var(--text-muted); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 50px; }
        .stats-container { display: flex; gap: 40px; margin-bottom: 50px; text-align: center; justify-content: center; border-top: var(--border-gold); border-bottom: var(--border-gold); padding: 25px 0; width: 80%; max-width: 800px;}
        .stat-box { padding: 0 30px; border-right: 1px solid rgba(182, 141, 64, 0.2); }
        .stat-box:last-child { border-right: none; }
        .stat-num { font-family: var(--font-serif); font-size: 2.5rem; color: var(--gold-light); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
        .start-btn { padding: 18px 45px; background: transparent; color: var(--gold-light); border: 1px solid var(--gold-dark); font-family: var(--font-serif); font-size: 1.1rem; letter-spacing: 3px; cursor: pointer; transition: all 0.4s; }
        .start-btn:hover { background: var(--gold-dark); color: #161412; }

        /* ===== 5. 音乐版图 ===== */
        #map-view { display: flex; flex-direction: row; height: 100%; overflow: hidden; padding: 20px; box-sizing: border-box; gap: 30px; position: relative;}
        
        .roster-panel { width: 280px; height: 100%; display: flex; flex-direction: column; background: var(--surface-color); border: var(--border-gold); padding: 20px 0; box-sizing: border-box; box-shadow: 5px 0 20px rgba(0,0,0,0.5); z-index: 10;}
        .roster-title { font-family: var(--font-serif); color: var(--gold-light); text-align: center; font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 5px; }
        
        /* 新增：引导提示 */
        .roster-subtitle { text-align: center; font-size: 0.75rem; color: var(--gold-dark); margin-bottom: 20px; font-style: italic; border-bottom: 1px solid rgba(182, 141, 64, 0.2); padding-bottom: 15px; animation: pulseText 2s infinite; }
        @keyframes pulseText { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 8px rgba(182,141,64,0.5); } }

        .roster-list-wrap { overflow-y: auto; flex: 1; }
        .artist-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); transition: all 0.3s; display: flex; justify-content: space-between; align-items: center;}
        .artist-item:hover { background: rgba(182, 141, 64, 0.1); padding-left: 35px; }
        .artist-item.active { background: linear-gradient(90deg, rgba(182, 141, 64, 0.2), transparent); border-left: 4px solid var(--gold-light); }
        .artist-name { font-size: 1rem; color: var(--text-main); }
        .artist-year { font-size: 0.75rem; color: var(--gold-dark); font-family: var(--font-serif); }

        .map-container { 
            flex: 1; position: relative; overflow: hidden; border: var(--border-gold);
            background: radial-gradient(circle at center, rgba(42, 37, 34, 0.6) 0%, #161412 80%), linear-gradient(rgba(182, 141, 64, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(182, 141, 64, 0.08) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }
        .map-inner { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .map-container.ticket-open .map-inner { transform: translateX(-15%); }
        .china-map-svg { width: 90%; height: 90%; max-width: 800px; opacity: 0.4; filter: drop-shadow(0 0 10px rgba(182, 141, 64, 0.2)); }
        .map-path { fill: none; stroke: var(--gold-dark); stroke-width: 1.5; }
        
        .city-pin { position: absolute; width: 14px; height: 14px; background: var(--gold-light); border-radius: 50%; border: 3px solid #161412; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(182, 141, 64, 0.5); opacity: 0; transition: all 0.5s ease; cursor: pointer; z-index: 5;}
        .city-pin.show-pin { opacity: 0.8; }
        .city-pin::after { content: attr(data-name); position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; color: var(--gold-dark); letter-spacing: 2px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; font-family: var(--font-sans); }
        
        /* 新增：星际涟漪动效 */
        .city-pin .ripple-1, .city-pin .ripple-2 { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid var(--gold-light); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; }
        .city-pin.active { opacity: 1; border-color: var(--gold-light); background: #fff; z-index: 10; transform: translate(-50%, -50%) scale(1.3); }
        .city-pin.active::after { opacity: 1; color: var(--gold-light); font-weight: bold; }
        .city-pin.active .ripple-1 { animation: rippleAnim 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .city-pin.active .ripple-2 { animation: rippleAnim 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; animation-delay: 1s; }
        
        @keyframes rippleAnim { 0% { width: 14px; height: 14px; opacity: 0.8; } 100% { width: 80px; height: 80px; opacity: 0; border-width: 0px; } }

        /* 新增：时光轴 Time Machine */
        .timeline-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(22, 20, 18, 0.8); padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(182, 141, 64, 0.3); backdrop-filter: blur(8px); z-index: 20; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .year-btn { color: var(--text-muted); font-family: var(--font-serif); font-size: 0.9rem; cursor: pointer; transition: all 0.3s; padding: 5px 10px; border-radius: 15px;}
        .year-btn:hover { color: var(--text-main); }
        .year-btn.active { background: var(--gold-dark); color: #161412; font-weight: bold; }

        /* 票根样式 */
        .ticket-overlay { position: absolute; right: -400px; top: 50%; transform: translateY(-50%); width: 340px; background: rgba(232, 220, 202, 0.95); backdrop-filter: blur(8px); padding: 15px; box-shadow: -10px 10px 40px rgba(0,0,0,0.8); transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); display: flex; flex-direction: column; z-index: 50;}
        .ticket-overlay.show { right: 30px; }
        .close-ticket-btn { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; background: rgba(22, 20, 18, 0.1); color: #161412; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; z-index: 100;}
        .ticket-inner { border: 2px solid #161412; padding: 15px; height: 100%; display: flex; flex-direction: column; position: relative; margin-top: 15px;}
        
        /* 新增：铁粉徽章 */
        .hardcore-badge { position: absolute; top: -10px; left: -10px; background: linear-gradient(135deg, #d4af37, #b68d40); color: #161412; font-family: var(--font-serif); font-size: 0.75rem; font-weight: bold; padding: 6px 12px; border-radius: 4px; transform: rotate(-5deg); box-shadow: 2px 4px 10px rgba(0,0,0,0.4); border: 1px solid #fff; z-index: 10; display: none; }
        .hardcore-badge.show { display: block; animation: stampPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampPop { 0% { transform: scale(3) rotate(-20deg); opacity: 0; } 100% { transform: scale(1) rotate(-5deg); opacity: 1; } }

        .ticket-photo-box { width: 100%; height: 200px; background: var(--bg-color); border-bottom: 2px solid #161412; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .ticket-photo { width: 100%; height: 100%; object-fit: cover; }
        .ticket-info { padding: 20px 10px 10px; color: #161412; }
        .t-artist { font-family: var(--font-serif); font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        .t-event { font-size: 0.9rem; font-weight: bold; color: #554a3e; margin-bottom: 20px; letter-spacing: 1px;}
        .t-meta { display: flex; justify-content: space-between; border-top: 1px dashed #161412; border-bottom: 1px dashed #161412; padding: 15px 0; margin-bottom: 20px;}
        .t-meta-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .t-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: #8b8075; }
        .t-value { font-family: var(--font-serif); font-size: 1rem; font-weight: bold; }
        .t-stamp { position: absolute; bottom: 10px; right: 10px; font-family: var(--font-serif); font-size: 2rem; color: rgba(182, 141, 64, 0.3); transform: rotate(-15deg); border: 2px solid rgba(182, 141, 64, 0.3); border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            #map-view { flex-direction: column; padding: 10px; }
            .roster-panel { width: 100%; height: 32%; flex-shrink: 0; }
            .timeline-container { bottom: 10px; padding: 8px 15px; gap: 10px;}
            .year-btn { font-size: 0.8rem; padding: 4px 8px;}
            .ticket-overlay { position: absolute; width: 100%; left: 0; right: 0; bottom: -100%; top: auto; transform: none; height: auto; max-height: 85%; border-radius: 20px 20px 0 0; padding: 15px; z-index: 9999; }
            .ticket-overlay.show { bottom: 0; }
            .ticket-inner { border: none; padding: 0; margin-top: 25px;}
        }
    </style>
</head>
<body>

<audio id="bgm" preload="auto"></audio>

<nav class="navbar">
    <div class="nav-brand" onclick="switchView('home-view')">ZOYA'S ARCHIVE</div>
    <div class="nav-right">
        <div class="nav-links">
            <div class="nav-link active" onclick="switchView('home-view', this)">首 厅</div>
            <div class="nav-link" onclick="switchView('map-view', this)">音乐版图</div>
        </div>
        <div class="music-btn" id="music-btn" onclick="playAudio()">🎵</div>
    </div>
</nav>

<div id="home-view" class="view-layer active" style="display: flex;">
    <div class="home-profile"><img src="phtotos/me.jpg" alt="Zoya" onerror="this.src='https://via.placeholder.com/110/161412/e6c887?text=Zoya'"></div>
    <div class="hero-title">The Musical<br>Chronicles</div>
    <div class="hero-subtitle">A Private Collection of Live Memories</div>
    <button class="start-btn" onclick="startJourney()">Open The Archive</button>
</div>

<div id="map-view" class="view-layer">
    <div class="roster-panel">
        <div class="roster-title">ARTIST ROSTER</div>
        <div class="roster-subtitle">👉 点击艺人，解锁专属票根</div>
        <div class="roster-list-wrap" id="artist-list"></div>
    </div>
    
    <div class="map-container" id="map-container">
        <div class="map-inner" id="map-inner">
            <svg class="china-map-svg" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
                <path class="map-path" d="M780,180 C820,250 850,380 800,480 C750,550 680,680 500,720 C350,750 200,650 150,500 C100,380 120,280 280,220 C400,180 550,150 780,180 Z" />
                <path class="map-path" style="stroke-width: 0.5; opacity: 0.3;" d="M700,250 C750,350 720,450 650,500 C500,600 300,550 250,450 C200,350 300,280 450,250 C550,220 650,200 700,250 Z" />
            </svg>
            
            <div class="city-pin show-pin" id="pin-beijing" style="left: 70%; top: 35%;" data-name="北京">
                <div class="ripple-1"></div><div class="ripple-2"></div>
            </div>
            <div class="city-pin show-pin" id="pin-qingdao" style="left: 75%; top: 45%;" data-name="青岛">
                <div class="ripple-1"></div><div class="ripple-2"></div>
            </div>
            <div class="city-pin show-pin" id="pin-yichang" style="left: 60%; top: 60%;" data-name="宜昌">
                <div class="ripple-1"></div><div class="ripple-2"></div>
            </div>
        </div>
        
        <div class="timeline-container">
            <div class="year-btn active" onclick="filterByYear('All', this)">All</div>
            <div class="year-btn" onclick="filterByYear('2023', this)">2023</div>
            <div class="year-btn" onclick="filterByYear('2024', this)">2024</div>
            <div class="year-btn" onclick="filterByYear('2025', this)">2025</div>
        </div>
    </div>

    <div class="ticket-overlay" id="ticket-overlay">
        <div class="close-ticket-btn" onclick="closeTicket()">×</div>
        <div class="ticket-inner">
            <div class="hardcore-badge" id="hardcore-badge">忠实听众 · 二刷达成</div>
            <div class="ticket-photo-box" id="ticket-photo-box"></div>
            <div class="ticket-info">
                <div class="t-artist" id="t-artist">Artist Name</div>
                <div class="t-event" id="t-event">Event Title</div>
                <div class="t-meta">
                    <div class="t-meta-item"><span class="t-label">Date</span><span class="t-value" id="t-date">2023.01.01</span></div>
                    <div class="t-meta-item"><span class="t-label">Location</span><span class="t-value" id="t-location">City</span></div>
                </div>
                <div class="t-stamp">Z</div>
            </div>
        </div>
    </div>
</div>

<script>
    const bgm = document.getElementById('bgm');
    let isPlaying = false;
    bgm.src = "music/这样很好.mp3"; // 你的背景音乐

    function playAudio() {
        if(isPlaying){ bgm.pause(); isPlaying=false; document.getElementById('music-btn').classList.remove('playing');}
        else { bgm.play().catch(()=>{}); isPlaying=true; document.getElementById('music-btn').classList.add('playing');}
    }

    const memoriesData = [
        { id: 1, artist: "林志炫", event: "ONEtake2.0", date: "2023.07.08", location: "宜昌", pinId: "pin-yichang", photo: "phtotos/Terrylin.jpg" },
        { id: 2, artist: "邓紫棋", event: "I AM GLORIA", date: "2024.06.16", location: "青岛", pinId: "pin-qingdao", photo: "phtotos/GEM.jpg" },
        { id: 3, artist: "袁娅维", event: "个人巡演", date: "2024.09.21", location: "北京", pinId: "pin-beijing", photo: "phtotos/yuanyawei.jpg" },
        { id: 4, artist: "周深", event: "9.29Hz", date: "2024.09.22", location: "北京", pinId: "pin-beijing", photo: "phtotos/zhoushen.jpg" },
        { id: 10, artist: "汪苏泷", event: "十万伏特", date: "2025.03.23", location: "北京", pinId: "pin-beijing", photo: "phtotos/wangsulong.jpg" },
        { id: 11, artist: "林志炫", event: "ONEtake2.0", date: "2025.03.30", location: "北京", pinId: "pin-beijing", photo: "phtotos/Terrylin2.jpg" },
        { id: 12, artist: "张杰", event: "未·LIVE", date: "2025.04.18", location: "北京", pinId: "pin-beijing", photo: "phtotos/zhangjie.jpg" }
    ];

    // 统计歌手出现次数，用于铁粉徽章
    const artistCounts = {};
    memoriesData.forEach(d => { artistCounts[d.artist] = (artistCounts[d.artist] || 0) + 1; });

    function initMapSystem(filterYear = 'All') {
        const listDiv = document.getElementById('artist-list');
        listDiv.innerHTML = '';
        
        // 隐藏所有城市图钉
        document.querySelectorAll('.city-pin').forEach(pin => pin.classList.remove('show-pin'));

        memoriesData.forEach(data => {
            const year = data.date.split('.')[0];
            if(filterYear !== 'All' && year !== filterYear) return;

            // 显示该年份有演出的城市
            const targetPin = document.getElementById(data.pinId);
            if(targetPin) targetPin.classList.add('show-pin');

            const item = document.createElement('div');
            item.className = 'artist-item';
            item.innerHTML = `<span class="artist-name">${data.artist}</span><span class="artist-year">${year} · ${data.location}</span>`;
            
            item.onclick = () => {
                document.querySelectorAll('.artist-item').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.city-pin').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                if(targetPin) targetPin.classList.add('active');
                showTicketOverlay(data);
                playTicketSound(); // 触发环境音效
            };
            listDiv.appendChild(item);
        });
    }

    // 利用浏览器原生接口生成极短的“落针/敲击”环境音效彩蛋，免去下载文件烦恼
    function playTicketSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gainNode); gainNode.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
        } catch(e) {} // 忽略不支持的浏览器
    }

    function filterByYear(year, btn) {
        document.querySelectorAll('.year-btn').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        closeTicket();
        initMapSystem(year);
    }

    function closeTicket() {
        document.getElementById('ticket-overlay').classList.remove('show');
        document.getElementById('map-container').classList.remove('ticket-open'); 
        document.querySelectorAll('.artist-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.city-pin').forEach(el => el.classList.remove('active'));
    }

    function showTicketOverlay(data) {
        document.getElementById('t-artist').innerText = data.artist;
        document.getElementById('t-event').innerText = data.event;
        document.getElementById('t-date').innerText = data.date;
        document.getElementById('t-location').innerText = data.location;
        
        const photoBox = document.getElementById('ticket-photo-box');
        if(data.photo) { photoBox.innerHTML = `<img src="${data.photo}" class="ticket-photo" onerror="this.style.display='none'">`; }
        
        // 铁粉徽章判定
        const badge = document.getElementById('hardcore-badge');
        if(artistCounts[data.artist] > 1) {
            badge.classList.add('show');
            badge.innerText = `忠实听众 · ${artistCounts[data.artist]}刷达成`;
        } else {
            badge.classList.remove('show');
        }
        
        document.getElementById('ticket-overlay').classList.add('show');
        document.getElementById('map-container').classList.add('ticket-open'); 
    }

    function switchView(viewId, navElement) {
        if(navElement) {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            navElement.classList.add('active');
        }
        document.querySelectorAll('.view-layer').forEach(view => {
            view.style.opacity = '0';
            setTimeout(() => { view.style.display = 'none'; view.classList.remove('active'); }, 400); 
        });
        setTimeout(() => {
            const targetView = document.getElementById(viewId);
            targetView.style.display = 'flex';
            setTimeout(() => { targetView.style.opacity = '1'; targetView.classList.add('active'); }, 50);
        }, 400);
    }

    function startJourney() { if(!isPlaying) playAudio(); switchView('map-view', document.querySelectorAll('.nav-link')[1]); }
    window.onload = () => { initMapSystem(); };
</script>
</body>
</html>
