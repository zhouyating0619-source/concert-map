<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOYA's Concert Memories</title>
    <style>
        /* ===== 1. 未来科技基础设置 ===== */
        body {
            margin: 0; padding: 0;
            background: #050505; /* 纯黑背景 */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #dcdcdc; overflow: hidden; height: 100vh;
        }

        /* ===== 2. 全局导航栏 (全息品牌风格) ===== */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,255,255,0.2);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; padding: 0 20px; box-sizing: border-box;
        }
        
        /* 左侧：专属发光大写 LOGO */
        .nav-brand {
            font-size: 1.5rem; font-weight: 900; color: #fff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.4);
            letter-spacing: 2px; font-style: italic; cursor: pointer;
        }
        
        /* 右侧：导航链接与音乐按钮组合 */
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-link {
            font-size: 0.95rem; font-weight: 600; color: rgba(0,255,255,0.5); cursor: pointer;
            transition: color 0.3s;
        }
        .nav-link.active { color: rgba(220, 39, 67, 1); border-bottom: 2px solid rgba(220, 39, 67, 1); padding-bottom: 2px; }
        .nav-link:hover { color: rgba(0,255,255,1); }
        
        /* 音乐播放按钮 */
        .music-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: transparent; border: 1px solid rgba(0,255,255,0.2); 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.1rem; transition: transform 0.3s;
        }
        .music-btn.playing { animation: spin 4s linear infinite; border-color: rgba(220, 39, 67, 1); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ===== 3. 公共视图样式 ===== */
        .view-layer {
            position: absolute; top: 60px; bottom: 30px; /* 避开导航栏和底部版权高度 */
            left: 0; width: 100vw; height: calc(100vh - 90px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: none; opacity: 0; overflow-y: auto; overflow-x: hidden;
        }
        .view-layer.active { display: block; opacity: 1; transform: translateY(0); }

        /* ===== 4. 首页 (Future Home) ===== */
        #home-view { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; padding-top: 4vh; padding-bottom: 40px;
            transform: translateY(20px); 
        }
        
        .home-profile { 
            background: transparent; padding: 20px 30px; border-radius: 20px; 
            border: 1px solid rgba(0,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,255,255,0.05); text-align: center; margin-bottom: 20px;
        }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; letter-spacing: -1px; text-align: center; margin-bottom: 10px;}
        .hero-subtitle { font-size: 1rem; color: #8e8e8e; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
        
        .stats-container { display: flex; gap: 30px; margin-bottom: 50px; text-align: center; }
        .stat-box { background: transparent; padding: 20px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .stat-num { font-size: 2rem; font-weight: 800; color: rgba(0,255,255,1); }
        .stat-label { font-size: 0.8rem; color: rgba(220, 39, 67, 1); margin-top: 5px; }

        .start-btn {
            padding: 15px 40px; background: rgba(0,255,255,1); color: #000; border: none;
            border-radius: 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.3); transition: transform 0.2s, box-shadow 0.2s;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 255, 255, 0.4); }

        /* ===== 5. 光芒轨迹 (Timeline) ===== */
        .timeline-header { text-align: center; padding: 20px 20px 10px; }
        .timeline-header h1 { margin: 0; font-size: 2rem; font-weight: 800; color: rgba(0,255,255,1); }
        .timeline-container { position: relative; max-width: 600px; margin: 20px auto 50px; padding: 0 20px; }
        .timeline-container::after { content: ''; position: absolute; width: 2px; background: rgba(0,255,255,0.2); top: 0; bottom: 0; left: 40px; }
        
        .timeline-item { position: relative; margin: 35px 0; padding-left: 60px; cursor: pointer; transition: transform 0.3s; }
        .timeline-item:hover { transform: translateY(-5px); }
        .timeline-item::before {
            content: ''; position: absolute; width: 14px; height: 14px; 
            background: rgba(0,255,255,1);
            border: 3px solid #000; border-radius: 50%; left: 31px; top: 15px;
            box-shadow: 0 2px 8px rgba(0, 255, 255, 0.3); z-index: 1;
        }
        .timeline-content { background: #000; border: 1px solid rgba(0,255,255,0.2); border-radius: 16px; padding: 18px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        .timeline-date { color: #8e8e8e; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
        .timeline-artist { font-size: 1.3rem; font-weight: bold; }
        .timeline-location { color: #a8a8a8; font-size: 0.85rem; margin-top: 6px; }

        /* 全息地图插画插件 */
        .map-inset { position: absolute; right: -250px; top: 0; width: 200px; height: 150px; opacity: 0.5; }
        #china-map { width: 100%; height: 100%; }
        #china-map .land { fill: none; stroke: rgba(0,255,255,0.2); stroke-width: 1.5; }
        #china-map .city-point { fill: rgba(220, 39, 67, 1); stroke: #000; stroke-width: 1; }

        /* ===== 6. 3D 舞台 (Holographic Gallery) ===== */
        #carousel-view { display: none; overflow: hidden; } 
        .back-btn {
            position: absolute; top: 10px; left: 20px; z-index: 200;
            padding: 8px 16px; background: rgba(5, 5, 5, 0.8);
            border: 1px solid rgba(0,255,255,0.5); border-radius: 30px; color: rgba(0,255,255,1);
            font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(0,255,255,0.1);
        }
        .container { width: 100%; height: 55vh; margin-top: 5vh; perspective: 1500px; display: flex; align-items: center; justify-content: center; }
        .carousel { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
        
        .card {
            position: absolute; width: clamp(220px, 65vw, 300px); height: clamp(320px, 50vh, 420px);
            left: 50%; top: 50%; transform-origin: center;
            margin-left: calc(-1 * clamp(220px, 65vw, 300px) / 2); margin-top: calc(-1 * clamp(320px, 50vh, 420px) / 2);
            background: #000; border: 1px solid rgba(0,255,255,0.2); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,255,255,0.1);
            display: flex; flex-direction: column; padding: 12px; box-sizing: border-box; backface-visibility: hidden;
        }
        .card-photo { width: 100%; height: 70%; background-size: cover; background-position: center; border-radius: 12px; background-color: #050505; }
        .card-photo.no-photo { display: flex; align-items: center; justify-content: center; color: rgba(0,255,255,0.2); font-size: 3em; }
        .card-info { padding: 10px 5px 5px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;}
        .artist { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; color: rgba(0,255,255,1); }
        .details { font-size: 0.8rem; color: #8e8e8e; }

        .nav-buttons { position: absolute; bottom: 5vh; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .nav-buttons button { width: 45px; height: 45px; border-radius: 50%; background: rgba(5,5,5,0.9); border: 1px solid rgba(0,255,255,0.2); font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,255,0.1); color: rgba(0,255,255,1); }

        /* ===== 7. 关于热爱 (About View) ===== */
        #about-view { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .about-profile { background: rgba(255,255,255,0.05); padding: 20px 30px; border-radius: 20px; border: 1px solid rgba(220, 39, 67, 0.3); text-align: center; margin-bottom: 30px; }
        .about-quote { font-size: clamp(1.2rem, 4vw, 1.5rem); font-weight: 600; line-height: 1.6; color: #dcdcdc; max-width: 600px; margin-bottom: 30px; position: relative;}
        .about-quote::before { content: '“'; font-size: 4rem; color: rgba(0,255,255,0.2); position: absolute; top: -20px; left: -20px; z-index: -1;}
        .about-text { color: #8e8e8e; font-size: 0.95rem; line-height: 1.8; max-width: 500px; }

        /* ===== 8. 底部专属版权声明 ===== */
        .site-footer {
            position: fixed; bottom: 8px; width: 100%; text-align: center;
            font-size: 0.7rem; color: rgba(220, 220, 220, 0.3); /* 温和低调的灰白色 */
            z-index: 10; pointer-events: none; /* 不会遮挡点击 */
            letter-spacing: 1px; font-weight: 300;
        }

        /* 极简滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.2); border-radius: 4px; }

        /* 移动端适配调整 */
        @media (max-width: 600px) {
            .navbar { padding: 0 15px; }
            .nav-brand { font-size: 1.2rem; }
            .nav-link { font-size: 0.85rem; }
            .nav-links { gap: 10px; }
            .nav-right { gap: 10px; }
            .music-btn { width: 30px; height: 30px; font-size: 0.9rem;}
            .stats-container { gap: 15px; }
            .stat-box { padding: 15px 20px; }
            .stat-num { font-size: 1.5rem; }
            .site-footer { font-size: 0.6rem; transform: scale(0.9); }
        }
    </style>
</head>
<body>

<audio id="bgm" src="music/这样很好.mp3" loop preload="auto"></audio>

<nav class="navbar">
    <div class="nav-brand" onclick="switchView('home-view')">ZOYA</div>
    
    <div class="nav-right">
        <div class="nav-links">
            <div class="nav-link active" onclick="switchView('home-view', this)">首页</div>
            <div class="nav-link" onclick="switchView('timeline-view', this)">光芒轨迹</div>
            <div class="nav-link" onclick="switchView('about-view', this)">关于热爱</div>
        </div>
        <div class="music-btn" id="music-btn" onclick="toggleMusic()" title="播放/暂停音乐">🎵</div>
    </div>
</nav>

<div id="home-view" class="view-layer active" style="display: flex;">
    
    <div class="home-profile" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <img src="phtotos/me.jpg" alt="Zoya" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid rgba(0,255,255,0.8); object-fit: cover; box-shadow: 0 0 20px rgba(0,255,255,0.4);">
        <div>
            <div class="stat-num" style="font-size: 1.5rem; color: rgba(0,255,255,1);">ZOYA</div>
            <div class="stat-label" style="color: rgba(220, 39, 67, 1);">MATRIX OWNER</div>
        </div>
    </div>

    <div class="hero-title">Concert<br>MATRIX</div>
    <div class="hero-subtitle">My Live Music Archive</div>
    
    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-num">14</div>
            <div class="stat-label">点亮光芒</div>
        </div>
        <div class="stat-box">
            <div class="stat-num">3</div>
            <div class="stat-label">MATRIX CITIES</div>
        </div>
        <div class="stat-box">
            <div class="stat-num">12</div>
            <div class="stat-label">MATRIX ARTISTS</div>
        </div>
    </div>

    <button class="start-btn" onclick="startJourney()">ENTER MEMORY MATRIX</button>
</div>

<div id="timeline-view" class="view-layer">
    <div class="timeline-header">
        <h1>轨迹</h1>
    </div>
    <div class="timeline-container" id="timeline-container">
        <div class="map-inset">
            <svg id="china-map" viewBox="0 0 1000 800">
                <path class="land" d="M371,326l-14,8.1L343.3,313.4l-31,23.1L272.5,299l-13,25l-20-13l-34.8,22l-12-14.8L111,364.6l-15,13L87,364l-26,20L53,365.1l-25.1,19.2l12.1,33.1L30,442.2l10-18l19,10l-12,21.1l20,11.2l-21,17l36,25.1L82.1,514.2l-14.1,28L98,552l-11,27.1l32,22.1l-14,24l40,31.2l-12,18l24,20l-17,29l29,20.2l-15.1,23L211,768l-22.1,31l32.1,25l-14.1,23L268,881l-13.1,22l32,32.2l-14,23.1l40,31l-10,21l24,20.1l-12,23l24,20l-15.1,23L411,1088l-18.1,21l32.1,31l-14.1,23L468,1201l-11.1,27.1l40,31.2l-12,21.1l24,20l-17,29l29,20.2l-15.1,23L561,1368l-22.1,31l32.1,25l-14.1,23L618,1481l-13.1,22l32,32.2l-14,23.1l40,31l-10,21l24,20.1l-12,23l24,20l-15.1,23L761,1688l-18.1,21l32.1,31l-14.1,23L818,1801l-11.1,27.1l40,31.2l-12,21.1l24,20l-17,29l29,20.2l-15.1,23L911,1968l-22.1,31l32.1,25l-14.1,23L968,2081l-13.1,22l32,32.2l-14,23.1l40,31l-10,21l24,20.1l-12,23l24,20l-15.1,23Z"/>
                <circle class="city-point" id="beijing" cx="116.4" cy="39.9" r="6"/>
                <circle class="city-point" id="qingdao" cx="120.38" cy="36.06" r="6"/>
                <circle class="city-point" id="yichang" cx="111.29" cy="30.7" r="6"/>
            </svg>
        </div>
    </div>
</div>

<div id="carousel-view" class="view-layer" style="display: none;">
    <button class="back-btn" onclick="backToTimeline()">◀ 返回光芒轨迹</button>
    <div class="container">
        <div class="carousel" id="carousel"></div>
    </div>
    <div class="nav-buttons">
        <button onclick="prevCard()">❮</button>
        <button onclick="nextCard()">❯</button>
    </div>
</div>

<div id="about-view" class="view-layer">
    
    <div class="about-profile" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <img src="phtotos/me.jpg" alt="Zoya" style="width: 120px; height: 120px; border-radius: 50%; border: 2px solid rgba(220, 39, 67, 0.8); object-fit: cover; box-shadow: 0 0 25px rgba(220, 39, 67, 0.5);">
        <div>
            <div class="stat-num" style="font-size: 1.8rem; color: #fff;">ZOYA</div>
            <div class="stat-label" style="color: rgba(220, 39, 67, 1);">SYSTEM OWNER</div>
        </div>
    </div>

    <div class="about-quote">
        耳机里的声音<br>终有一天要站在台上听
    </div>
    <div class="about-text">
        <p>这里记录了我从 2023 年开始的每一场音乐相遇。</p>
        <p>每一张门票，每一次大合唱，每一个在台下落泪或欢呼的瞬间，都是时光里闪闪发光的星星。</p>
        <p>未完待续...</p>
    </div>
</div>

<div class="site-footer">
    © Zoya's Concert Memories. 记录关于热爱的每一个瞬间.
</div>

<script>
    // --- 音乐控制逻辑 ---
    const bgm = document.getElementById('bgm');
    const musicBtn = document.getElementById('music-btn');
    let isPlaying = false;

    function toggleMusic() {
        if (isPlaying) {
            bgm.pause();
            musicBtn.classList.remove('playing');
        } else {
            bgm.play();
            musicBtn.classList.add('playing');
        }
        isPlaying = !isPlaying;
    }

    // --- 页面导航切换逻辑 ---
    function switchView(viewId, navElement) {
        if(navElement) {
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            navElement.classList.add('active');
        } else if (viewId === 'home-view') {
            // 点击 Logo 回到首页时，也高亮首页文字
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelector('.nav-link').classList.add('active');
        }

        document.querySelectorAll('.view-layer').forEach(view => {
            view.style.opacity = '0';
            view.style.transform = 'translateY(20px)';
            setTimeout(() => {
                view.style.display = 'none';
                view.classList.remove('active');
            }, 300); 
        });

        setTimeout(() => {
            const targetView = document.getElementById(viewId);
            targetView.style.display = (viewId === 'home-view' || viewId === 'about-view') ? 'flex' : 'block';
            targetView.classList.add('active');
            
            setTimeout(() => {
                targetView.style.opacity = '1';
                targetView.style.transform = 'translateY(0)';
            }, 50);
        }, 300);
    }

    // 从首页点击“进入回忆矩阵”
    function startJourney() {
        if(!isPlaying) toggleMusic(); 
        const timelineNav = document.querySelectorAll('.nav-link')[1];
        switchView('timeline-view', timelineNav);
    }

    // --- 数据与核心逻辑 ---
    const concerts = [
        { date: '2023.07.08', location: '宜昌', artist: '林志炫', photo: 'phtotos/Terrylin.jpg' }, 
        { date: '2024.06.16', location: '青岛', artist: '邓紫棋', photo: 'phtotos/GEM.jpg' },
        { date: '2024.09.21', location: '北京', artist: '袁娅维', photo: '' },
        { date: '2024.09.22', location: '北京', artist: '周深', photo: '' },
        { date: '2024.10.05', location: '北京', artist: '国潮星动', photo: '' },
        { date: '2025.03.23', location: '北京', artist: '汪苏泷', photo: '' },
        { date: '2025.03.30', location: '北京', artist: '林志炫', photo: '' },
        { date: '2025.04.18', location: '北京', artist: '张杰', photo: '' },
        { date: '2025.04.20', location: '北京', artist: '李健', photo: '' },
        { date: '2025.06.01', location: '北京', artist: '凤凰传奇', photo: '' },
        { date: '2025.07.27', location: '北京', artist: '五月天', photo: '' },
        { date: '2025.08.15', location: '北京', artist: '王心凌', photo: '' },
        { date: '2025.09.20', location: '北京', artist: '刘雨昕', photo: '' },
        { date: '2025.09.27', location: '北京', artist: '胡夏', photo: '' }
    ];

    const timelineContainer = document.getElementById('timeline-container');
    const carousel = document.getElementById('carousel');
    const timelineView = document.getElementById('timeline-view');
    const carouselView = document.getElementById('carousel-view');
    
    const totalCards = concerts.length;
    let currentAngle = 0;
    let radius = 0;

    function initTimeline() {
        timelineContainer.innerHTML = '';
        concerts.forEach((concert, index) => {
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.onclick = () => showCarousel(index);
            item.innerHTML = `
                <div class="timeline-content">
                    <div class="timeline-date">${concert.date}</div>
                    <div class="timeline-artist">${concert.artist}</div>
                    <div class="timeline-location">📍 ${concert.location}</div>
                </div>
            `;
            timelineContainer.appendChild(item);
        });
    }

    function calcRadius() {
        const screenWidth = window.innerWidth;
        const cardWidth = screenWidth < 400 ? 220 : Math.min(screenWidth * 0.65, 300);
        const padding = screenWidth < 768 ? 40 : 100; 
        return Math.round((cardWidth / 2) / Math.tan(Math.PI / totalCards)) + padding;
    }

    function initCarousel() {
        carousel.innerHTML = ''; 
        radius = calcRadius();

        concerts.forEach((concert, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            const angle = i * (360 / totalCards);
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

            let mediaHTML = '';
            if (concert.photo && concert.photo.toLowerCase().endsWith('.mp4')) {
                mediaHTML = `<video class="card-photo" autoplay loop muted playsinline><source src="${concert.photo}" type="video/mp4"></video>`;
            } else if (concert.photo) {
                mediaHTML = `<div class="card-photo" style="background-image: url('${concert.photo}')"></div>`;
            } else {
                mediaHTML = `<div class="card-photo no-photo">🎵</div>`;
            }

            card.innerHTML = `
                ${mediaHTML}
                <div class="card-info">
                    <div class="artist">${concert.artist}</div>
                    <div class="details">${concert.date} · ${concert.location}</div>
                </div>
            `;
            carousel.appendChild(card);
        });
        applyTransform();
    }

    function showCarousel(targetIndex) {
        timelineView.style.opacity = '0';
        setTimeout(() => {
            timelineView.style.display = 'none';
            carouselView.style.display = 'flex';
            currentAngle = -targetIndex * (360 / totalCards);
            applyTransform();
            setTimeout(() => {
                carouselView.style.opacity = '1';
                carouselView.style.transform = 'scale(1)';
            }, 50);
        }, 300);
    }

    function backToTimeline() {
        carouselView.style.opacity = '0';
        setTimeout(() => {
            carouselView.style.display = 'none';
            timelineView.style.display = 'block';
            setTimeout(() => timelineView.style.opacity = '1', 50);
        }, 300);
    }

    function nextCard() { currentAngle -= 360 / totalCards; applyTransform(); }
    function prevCard() { currentAngle += 360 / totalCards; applyTransform(); }
    function applyTransform() { carousel.style.transform = `rotateY(${currentAngle}deg)`; }

    window.addEventListener('resize', () => {
        radius = calcRadius();
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, i) => {
            const angle = i * (360 / totalCards);
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
        });
    });

    let startX = 0;
    window.addEventListener('touchstart', (e) => {
        if(carouselView.style.display === 'flex') startX = e.touches[0].clientX;
    });
    window.addEventListener('touchend', (e) => {
        if(carouselView.style.display !== 'flex') return; 
        const endX = e.changedTouches[0].clientX;
        if(Math.abs(startX - endX) < 40) return; 
        if(endX < startX) nextCard();
        else prevCard();
    });

    initTimeline();
    initCarousel();
</script>
</body>
</html>
