<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的演唱会回忆录</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 标题适配 */
        .header {
            position: absolute; top: 5vh; text-align: center; z-index: 100;
            width: 100%; padding: 0 10px; box-sizing: border-box; pointer-events: none;
        }
        h1 {
            margin: 0; 
            font-size: clamp(1.8rem, 6vw, 2.5rem); /* 根据屏幕大小自动调整字体 */
            color: #fff; text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700;
            letter-spacing: 2px;
        }
        .subtitle { color: #aaa; margin-top: 5px; font-size: clamp(0.8rem, 3vw, 1rem); }

        /* 3D 舞台适配 */
        .container {
            width: 100%; height: 60vh; margin-top: 5vh;
            perspective: 1500px;
            display: flex; align-items: center; justify-content: center;
        }

        .carousel {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 卡片自适应大小 */
        .card {
            position: absolute;
            /* 宽度：手机上占 70%，电脑上最大 300px */
            width: clamp(220px, 70vw, 300px);
            /* 高度：手机上占 55%，电脑上最大 400px */
            height: clamp(320px, 55vh, 420px);
            /* 绝对居中算法 */
            left: 50%; top: 50%;
            transform-origin: center;
            margin-left: calc(-1 * clamp(220px, 70vw, 300px) / 2);
            margin-top: calc(-1 * clamp(320px, 55vh, 420px) / 2);

            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden; display: flex; flex-direction: column;
            backface-visibility: hidden; transition: box-shadow 0.3s, border 0.3s;
        }
        .card:hover { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); border: 1px solid #ffd700; }

        /* 媒体区域适配 (兼容照片和视频) */
        .card-photo {
            width: 100%; height: 75%;
            background-size: cover; background-position: center;
            border-bottom: 2px solid #ffd700;
            object-fit: cover; /* 保证视频不变形 */
        }
        .card-photo.no-photo {
            background: linear-gradient(135deg, #111 0%, #333 100%);
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: clamp(3em, 10vw, 5em);
        }

        .card-info {
            padding: 10px 15px; flex: 1;
            display: flex; flex-direction: column; justify-content: center;
        }
        .artist { font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: bold; color: #fff; margin-bottom: 5px; }
        .details { font-size: clamp(0.75rem, 3vw, 0.9rem); color: #ffd700; opacity: 0.8; }
        .date { font-family: monospace; }

        /* 按钮适配 */
        .nav-buttons {
            position: absolute; bottom: 5vh; display: flex; gap: 20px; z-index: 100;
        }
        button {
            padding: 10px 25px; background: rgba(0,0,0,0.4);
            border: 1px solid #ffd700; border-radius: 30px;
            color: #ffd700; font-size: clamp(0.9rem, 3vw, 1rem); font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px);
        }
        button:active { background: #ffd700; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <h1>Concert Memories</h1>
    <p class="subtitle">2023 - 2025 · 点亮了 14 场光芒</p>
</div>

<div class="container">
    <div class="carousel" id="carousel"></div>
</div>

<div class="nav-buttons">
    <button onclick="prevCard()">PREV</button>
    <button onclick="nextCard()">NEXT</button>
</div>

<script>
    // 在这里填入你的图片或视频链接 (注意扩展名 .jpg 或 .mp4)
    const concerts = [
        { date: '2023.07.08', location: '宜昌', artist: '林志炫', photo: '' }, 
        { date: '2024.06.16', location: '青岛', artist: '邓紫棋', photo: '' },
        { date: '2024.09.21', location: '北京', artist: '袁娅维', photo: '' },
        { date: '2024.09.22', location: '北京', artist: '周深', photo: '' },
        { date: '2024.10.05', location: '北京', artist: '国潮星动', photo: '' },
        { date: '2025.03.23', location: '北京', artist: '汪苏泷', photo: '' },
        { date: '2025.03.30', location: '北京', artist: '林志炫', photo: '' },
        { date: '2025.04.18', location: '北京', artist: '张杰', photo: '' },
        { date: '2025.04.20', location: '北京', artist: '李健', photo: '' },
        { date: '2025.06.01', location: '北京', artist: '凤凰传奇', photo: '' },
        { date: '2025.07.27', location: '北京', artist: '五月天', photo: '' },
        { date: '2025.08.15', location: '北京', artist: '王心凌', photo: '' },
        { date: '2025.09.20', location: '北京', artist: '刘雨昕', photo: '' },
        { date: '2025.09.27', location: '北京', artist: '胡夏', photo: '' }
    ];

    const carousel = document.getElementById('carousel');
    const totalCards = concerts.length;
    let currentAngle = 0;
    let radius = 0;

    // 动态计算 3D 旋转半径 (屏幕越窄，半径越小，防止出界)
    function calcRadius() {
        // 获取实际设备宽度
        const screenWidth = window.innerWidth;
        // 估算当前卡片宽度
        const cardWidth = screenWidth < 400 ? 220 : Math.min(screenWidth * 0.7, 300);
        // 手机端让卡片紧凑一点，电脑端拉开距离
        const padding = screenWidth < 768 ? 60 : 130; 
        return Math.round((cardWidth / 2) / Math.tan(Math.PI / totalCards)) + padding;
    }

    function init() {
        carousel.innerHTML = ''; 
        radius = calcRadius();

        concerts.forEach((concert, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            const angle = i * (360 / totalCards);
            
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

            let mediaHTML = '';
            // 智能判断图片还是视频
            if (concert.photo && concert.photo.toLowerCase().endsWith('.mp4')) {
                // playsinline 确保在苹果手机上不会自动全屏
                mediaHTML = `
                    <video class="card-photo" autoplay loop muted playsinline>
                        <source src="${concert.photo}" type="video/mp4">
                    </video>`;
            } else if (concert.photo) {
                mediaHTML = `<div class="card-photo" style="background-image: url('${concert.photo}')"></div>`;
            } else {
                mediaHTML = `<div class="card-photo no-photo">🎵</div>`;
            }

            card.innerHTML = `
                ${mediaHTML}
                <div class="card-info">
                    <div class="artist">${concert.artist}</div>
                    <div class="details">
                        <span class="date">${concert.date}</span> · 
                        <span class="location">${concert.location}</span>
                    </div>
                </div>
            `;
            carousel.appendChild(card);
        });
        applyTransform();
    }

    function nextCard() { currentAngle -= 360 / totalCards; applyTransform(); }
    function prevCard() { currentAngle += 360 / totalCards; applyTransform(); }
    function applyTransform() { carousel.style.transform = `rotateY(${currentAngle}deg)`; }

    // 监听屏幕旋转或窗口缩放，重新计算布局
    window.addEventListener('resize', () => {
        radius = calcRadius();
        const cards = document.querySelectorAll('.card');
        cards.forEach((card, i) => {
            const angle = i * (360 / totalCards);
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
        });
    });

    init();
    
    // 手机端左右滑屏支持
    let startX = 0;
    window.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
    window.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].clientX;
        if(Math.abs(startX - endX) < 40) return; 
        if(endX < startX) nextCard();
        else prevCard();
    });
</script>
</body>
</html>
