<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的演唱会足迹地图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #fff; font-family: sans-serif; overflow: hidden; }
        #main { width: 100vw; height: 100vh; }
        .title { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 24px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
    </style>
</head>
<body>
<div class="title">
    <h1>我的演唱会足迹</h1>
    <p>2023 - 2025 · 已点亮 3 个城市 · 14 场演出</p>
</div>
<div id="main"></div>
<script>
    const chart = echarts.init(document.getElementById('main'));
    const geoCoordMap = { '北京': [116.405, 39.904], '宜昌': [111.290, 30.702], '青岛': [120.382, 36.067] };
    const concertData = [
        { name: '宜昌', value: [{ date: '2023.07.08', artist: '林志炫' }]},
        { name: '青岛', value: [{ date: '2024.06.16', artist: '邓紫棋' }]},
        { name: '北京', value: [
            { date: '2024.09.21', artist: '袁娅维' }, { date: '2024.09.22', artist: '周深' },
            { date: '2024.10.05', artist: '国潮星动' }, { date: '2025.03.23', artist: '汪苏泷' },
            { date: '2025.03.30', artist: '林志炫' }, { date: '2025.04.18', artist: '张杰' },
            { date: '2025.04.20', artist: '李健' }, { date: '2025.06.01', artist: '凤凰传奇' },
            { date: '2025.07.27', artist: '五月天' }, { date: '2025.08.15', artist: '王心凌' },
            { date: '2025.09.20', artist: '刘雨昕' }, { date: '2025.09.27', artist: '胡夏' }
        ]}
    ];

    const convertData = (data) => data.map(item => ({
        name: item.name,
        value: geoCoordMap[item.name].concat(item.value.length),
        details: item.value
    }));

    // 使用更稳定的地图数据源
    fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
    .then(res => res.json())
    .then(chinaJson => {
        echarts.registerMap('china', chinaJson);
        chart.setOption({
            tooltip: {
                trigger: 'item',
                formatter: params => {
                    let res = `<b style="color:#ffd700">${params.name}</b><br/>`;
                    params.data.details.forEach(it => res += `${it.date} ${it.artist}<br/>`);
                    return res;
                }
            },
            geo: {
                map: 'china', roam: true,
                itemStyle: { areaColor: '#323c48', borderColor: '#404a59' },
                emphasis: { itemStyle: { areaColor: '#2a333d' } }
            },
            series: [{
                type: 'effectScatter', coordinateSystem: 'geo',
                data: convertData(concertData),
                symbolSize: val => Math.max(val[2] * 5, 12),
                itemStyle: { color: '#ffd700' },
                label: { show: true, formatter: '{b}', position: 'right', color: '#fff' }
            }]
        });
    }).catch(err => console.error('地图加载失败:', err));

    window.onresize = () => chart.resize();
</script>
</body>
</html>
